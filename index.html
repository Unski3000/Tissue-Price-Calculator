<script>
const TYPES = {
  regular: { label:'Regular Roll', wt:83,  core:true  },
  jumbo:   { label:'Jumbo Roll',   wt:150, core:true  },
  tissue:  { label:'Tissue Paper', wt:55,  core:false },
  towel:   { label:'Kitchen Towel',wt:110, core:true  },
};

const PACKS = [
  { name:'Single Rolls',    tag:'×40',      naked:false, pCost:1.16, qty:40,   rolls:1,  unit:'roll' },
  { name:'Twin / 2-Pack',   tag:'×20',      naked:false, pCost:2.00, qty:20,   rolls:2,  unit:'pack' },
  { name:'Quad / 4-Pack',   tag:'×10',      naked:false, pCost:5.00, qty:10,   rolls:4,  unit:'pack' },
  { name:'Jumbo Pack',      tag:'×6⅔',      naked:false, pCost:5.00, qty:40/6, rolls:6,  unit:'pack' },
  { name:'10-Pack (Naked)', tag:'×4 Naked', naked:true,  pCost:4.00, qty:4,    rolls:10, unit:'pack' },
];

const BALE_BAG = 11.60;
let curType = 'regular';

function setType(btn, t) {
  curType = t;

  document.querySelectorAll('.pill').forEach(p => {
    p.classList.remove('on');
  });

  btn.classList.add('on');

  const cfg = TYPES[t];

  document.getElementById('rollWt').value = cfg.wt;

  document.getElementById('coreBox').style.display =
    cfg.core ? '' : 'none';

  calc();
}

function fmt(n, dp = 0) {
  return Number(n).toLocaleString('en-KE', {
    minimumFractionDigits: dp,
    maximumFractionDigits: dp
  });
}

function safeDivide(a, b) {
  return b === 0 ? 0 : a / b;
}

function calc() {

  const tP = parseFloat(document.getElementById('tissueP').value) || 0;

  const trP = parseFloat(document.getElementById('transP').value) || 0;

  const totK = tP + trP;

  const wt =
    (parseFloat(document.getElementById('rollWt').value) || 0) / 1000;

  const cP =
    parseFloat(document.getElementById('coreP').value) || 0;

  const cuts =
    parseFloat(document.getElementById('cutsP').value) || 1;

  const mkPc =
    parseFloat(document.getElementById('mkup').value) || 0;

  const mkF = 1 + (mkPc / 100);

  const hasC = TYPES[curType].core;

  // -----------------------------
  // Core Calculations
  // -----------------------------

  const matCost = totK * wt;

  const coreCost = hasC
    ? safeDivide(cP, cuts)
    : 0;

  const rollCost = matCost + coreCost;

  const base40 = rollCost * 40;

  // -----------------------------
  // Update Mother Roll Display
  // -----------------------------

  document.getElementById('totRoll').innerHTML =
    `<span>Total mother roll cost</span>
     <strong>${fmt(totK,2)} KES/kg</strong>`;

  // Material / Roll auto display
  document.getElementById('matRoll').value =
    fmt(matCost, 2);

  // Core Cost
  if (hasC) {

    document.getElementById('coreStrip').innerHTML =
      `<span>Core cost per roll</span>
       <strong>${fmt(coreCost,3)} KES/roll</strong>`;
  }

  // -----------------------------
  // Summary Stats
  // -----------------------------

  document.getElementById('stats').innerHTML = `
    <div class="stat">
      <div class="stat-v">${fmt(rollCost,2)}</div>
      <div class="stat-l">KES / roll</div>
    </div>

    <div class="stat">
      <div class="stat-v">${fmt(base40,0)}</div>
      <div class="stat-l">40-roll base</div>
    </div>

    <div class="stat">
      <div class="stat-v">${mkPc}%</div>
      <div class="stat-l">Markup</div>
    </div>
  `;

  // -----------------------------
  // Product Cards
  // -----------------------------

  let html = '';

  PACKS.forEach(p => {

    const pkgC =
      (p.pCost * p.qty) + BALE_BAG;

    const prod =
      base40 + pkgC;

    const sell =
      prod * mkF;

    const profit =
      sell - prod;

    const perU =
      safeDivide(sell, p.qty);

    html += `
      <div class="card">

        <div class="card-hd">
          <span class="card-name">${p.name}</span>

          <span class="badge${p.naked ? ' naked' : ''}">
            ${p.tag}
          </span>
        </div>

        <div class="card-px">

          <div class="px-cell">
            <div class="px-lbl">Production cost / bale</div>

            <div class="px-val">
              ${fmt(prod,0)}
            </div>

            <div class="px-sub">
              KES
            </div>
          </div>

          <div class="px-cell">
            <div class="px-lbl">
              Market price / bale
            </div>

            <div class="px-val mk">
              ${fmt(sell,0)}
            </div>

            <div class="px-sub">
              ${fmt(perU,0)} KES / ${p.unit}
            </div>
          </div>

        </div>

        <div class="profit">
          <span>
            Gross profit @ ${mkPc}% markup
          </span>

          <strong>
            +${fmt(profit,0)} KES
          </strong>
        </div>

        <div class="warn">
          <p>
            <strong>Notice:</strong>
            Please verify the cost of all inputs before using the price given by this app.
          </p>
        </div>

      </div>
    `;
  });

  // -----------------------------
  // Notes
  // -----------------------------

  html += `
    <div class="sec"
         style="font-size:11px;
                color:var(--txt2);
                line-height:1.7;">

      <strong style="
        display:block;
        margin-bottom:6px;
        color:var(--txt);">

        Notes
      </strong>

      Jumbo Pack assumes 6 rolls per pack
      (40 ÷ 6 = 6.67 packs/bale).
      Confirm with supplier.
      <br><br>

      10-Pack sleeve cost is
      4 KES per sleeve only.
      Tissue/material cost is calculated separately.
      <br><br>

      Mother roll price varies with transport.
      Update Tissue + Transport fields independently for accuracy.

    </div>
  `;

  document.getElementById('cards').innerHTML = html;
}

calc();
</script>
